{% extends "base.html" %}

{% block hero_content %}
<div class="login-container" style="max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1);">
  <h2 class="text-center mb-4">Login</h2>
  <form method="POST">
    <div class="form-group">
      <input type="text" name="username" class="form-control" placeholder="Username" required autofocus>
    </div>
    <div class="form-group mt-3">
      <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>
    <div class="d-grid gap-2 mt-4">
      <button type="submit" class="btn btn-success btn-block">Login</button>
    </div>
  </form>
  <p class="mt-3 text-center">
    Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
  </p>
</div>
{% endblock %}
